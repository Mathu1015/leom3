name: leom3 Mirror Bot

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Clone Repo
        run: |
          git clone https://github.com/Mathu1015/leom3.git
          cd leom3
          chmod +x start.sh

      - name: Setup Environment
        run: |
          sudo apt update -y
          sudo apt install -y python3 python3-pip git curl

      - name: Install Requirements
        run: |
          cd leom3
          pip3 install -r requirements.txt

      - name: Run Update + Bot
        run: |
          cd leom3
          python3 update.py
          bash start.sh

      - name: Keep Alive
        run: |
          while true; do sleep 300; done
