name: Mirror Bot Run

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Clone Repo
        run: |
          git clone https://github.com/Mathu1015/leom3.git
          cd leom3

      - name: Setup Python
        run: |
          sudo apt update -y
          sudo apt install python3 python3-pip -y

      - name: Install Requirements
        run: |
          cd leom3
          pip3 install -r requirements.txt

      - name: Run Bot
        run: |
          cd leom3
          python3 main.py

      - name: Keep Alive
        run: |
          while true; do sleep 300; done
