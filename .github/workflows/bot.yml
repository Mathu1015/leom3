name: leom3 Mirror Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Clone Repository
        run: |
          git clone https://github.com/Mathu1015/leom3.git
          cd leom3
          chmod +x start.sh

      - name: Setup System Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y python3 python3-pip curl git

      - name: Install Python Requirements
        run: |
          cd leom3
          pip3 install -r requirements.txt

      - name: Load Config (if needed)
        run: |
          cd leom3
          if [ -f config.env ]; then
            export $(grep -v '^#' config.env | xargs)
          fi

      - name: Start Mirror Bot (MAIN)
        run: |
          cd leom3
          bash start.sh

      - name: Keep Alive Session
        run: |
          while true; do
            echo "Bot Running..."
            sleep 300
          done
