name: leom3

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Clone Repo
        run: |
          git clone https://github.com/Mathu1015/leom3.git
          cd leom3

      - name: Install Requirements
        run: |
          cd leom3
          sudo apt update -y
          sudo apt install -y python3 python3-pip
          pip3 install -r requirements.txt

      - name: Set Environment
        run: |
          echo "BASE_URL=http://localhost" >> $GITHUB_ENV
          echo "PORT=8080" >> $GITHUB_ENV

      - name: Run Bot
        run: |
          cd leom3
          python3 update.py
          bash start.sh

      - name: Keep Alive
        run: |
          while true; do sleep 300; done
