name: Mirror Bot Run

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Clone Repo
        run: |
          git clone https://github.com/Mathu1015/leom3.git
          cd leom3
          ls -la

      - name: Setup Python
        run: |
          sudo apt update -y
          sudo apt install python3 python3-pip -y

      - name: Install Requirements
        run: |
          cd leom3
          pip3 install -r requirements.txt

      - name: Find and Run Bot
        run: |
          cd leom3
          echo "Checking files..."
          ls -la

          # Try common entry files safely
          if [ -f main.py ]; then
            python3 main.py
          elif [ -f bot.py ]; then
            python3 bot.py
          elif [ -f run.py ]; then
            python3 run.py
          else
            echo "❌ No entry file found (main.py/bot.py/run.py)"
            exit 1
          fi

      - name: Keep Alive
        run: |
          while true; do sleep 300; done
